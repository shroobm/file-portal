document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

5,0);} 100%{box-shadow:0 0 0 0 rgba(111,191,115,0);} }\n  @keyframes assay-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(217,119,87,.6);} 50%{box-shadow:0 0 0 4px rgba(217,119,87,0);} }\n  @keyframes vault-glow { 0%,100%{box-shadow:0 0 3px rgba(217,119,87,.5);} 50%{box-shadow:0 0 14px rgba(217,119,87,.95);} }\n  @keyframes vault-spin { to { transform: rotate(360deg); } }\n  @keyframes drill-fade { from { opacity: 0; } to { opacity: 1; } }\n  @keyframes drill-in { from { opacity: 0; transform: scale(.38); } to { opacity: 1; transform: scale(1); } }\n  @media (prefers-reduced-motion: reduce) { * { animation: none !important; transition: none !important; } }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ rootRef }}\" data-theme=\"{{ theme }}\" data-accent=\"{{ accent }}\" style=\"min-height:100vh;font-family:var(--font-sans);font-size:14px;line-height:1.5;color:var(--text);letter-spacing:-.006em;-webkit-font-smoothing:antialiased;background:{{ wrapBg }}\">\n\n  <!-- ══════════════════════════════════════ ROOM (operations dashboard) ══ -->\n  <sc-if value=\"{{ isRoom }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:20px clamp(14px,3vw,30px) 40px\">\n    <header style=\"display:flex;align-items:center;gap:14px;padding:6px 2px 20px;flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:11px\">\n        <svg sc-camel-view-box=\"0 0 40 40\" style=\"width:30px;height:30px;flex:none;color:var(--clay)\" fill=\"none\">\n          <path d=\"M20 3 34.6 11.5 34.6 28.5 20 37 5.4 28.5 5.4 11.5Z\" stroke=\"currentColor\" stroke-width=\"1.6\" opacity=\".55\"><\u002Fpath>\n          <path d=\"M20 11 27.8 15.5 27.8 24.5 20 29 12.2 24.5 12.2 15.5Z\" fill=\"currentColor\" opacity=\".16\"><\u002Fpath>\n          <circle cx=\"20\" cy=\"20\" r=\"3.1\" fill=\"currentColor\"><\u002Fcircle>\n        <\u002Fsvg>\n        <div>\n          <h1 style=\"font-size:15px;font-weight:600;letter-spacing:-.01em\">File&nbsp;Portal<\u002Fh1>\n          <span style=\"font-family:var(--font-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--text-3)\">Operations Room<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"flex:1\"><\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n        <span title=\"Quarantined prototype — self-contained simulation, not wired to the pipeline\" style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 10px;border-radius:999px;background:var(--warn-bg);border:1px solid rgba(224,179,76,.3);font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--warn)\">⚠ quarantined<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;background:var(--surface-1);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-2)\"><span style=\"width:7px;height:7px;border-radius:50%;background:var(--ok);animation:ping 2.4s infinite\"><\u002Fspan>System <b style=\"color:var(--text);font-weight:500\">{{ sysLabel }}<\u002Fb><\u002Fspan>\n        <span sc-camel-on-click=\"{{ toggleWatcher }}\" title=\"Conveyor watcher — click to pause intake\" style=\"display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;background:var(--surface-1);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-2);cursor:pointer\"><span style=\"width:7px;height:7px;border-radius:50%;background:{{ watcherColor }}\"><\u002Fspan>Watcher <b style=\"color:var(--text);font-weight:500\">{{ watcherLabel }}<\u002Fb><\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--surface-1);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text-2)\">GPU <b style=\"color:var(--text);font-weight:500\">{{ gpu }}<\u002Fb>/10&nbsp;GB<\u002Fspan>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:999px;background:var(--surface-1);border:1px solid var(--border);font-family:var(--font-mono);font-size:11px;color:var(--text)\"><span style=\"font-variant-numeric:tabular-nums\">{{ clock }}<\u002Fspan> UTC<\u002Fspan>\n        <button sc-camel-on-click=\"{{ openObsidian }}\" title=\"Open Obsidian on the vault\" style=\"width:32px;height:30px;display:inline-grid;place-items:center;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-sm);color:#a99bd1;cursor:pointer;font-size:13px\" style-hover=\"border-color:var(--border-strong)\">◆<\u002Fbutton>\n        <button sc-camel-on-click=\"{{ openZennotes }}\" title=\"Open ZenNotes on the vault\" style=\"width:32px;height:30px;display:inline-grid;place-items:center;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-sm);color:#8fbf9f;cursor:pointer;font-size:13px\" style-hover=\"border-color:var(--border-strong)\">◈<\u002Fbutton>\n        <span style=\"display:inline-flex;gap:5px;padding:6px 8px;border-radius:var(--r-sm);background:var(--surface-1);border:1px solid var(--border)\">\n          <sc-for list=\"{{ accents }}\" as=\"ac\" hint-placeholder-count=\"3\"><button sc-camel-on-click=\"{{ ac.set }}\" title=\"{{ ac.key }} accent\" style=\"width:14px;height:14px;padding:0;border-radius:50%;cursor:pointer;background:{{ ac.color }};border:2px solid {{ ac.ring }}\"><\u002Fbutton><\u002Fsc-for>\n        <\u002Fspan>\n        <button sc-camel-on-click=\"{{ toggleTheme }}\" title=\"Toggle theme\" style=\"width:32px;height:30px;display:inline-grid;place-items:center;background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text-2);cursor:pointer;font-size:14px\" style-hover=\"border-color:var(--border-strong)\">◐<\u002Fbutton>\n        <span style=\"display:inline-flex;gap:2px;padding:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:8px\">\n          <sc-for list=\"{{ modes }}\" as=\"m\" hint-placeholder-count=\"3\"><button sc-camel-on-click=\"{{ m.set }}\" style=\"font-family:var(--font-mono);font-size:10.5px;letter-spacing:.04em;text-transform:uppercase;padding:4px 9px;border:0;border-radius:6px;cursor:pointer;transition:.15s;color:{{ m.color }};background:{{ m.bg }}\">{{ m.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <section style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px\">\n      <div style=\"display:flex;align-items:baseline;gap:12px;padding:13px 16px 4px;flex-wrap:wrap\">\n        <span style=\"font-size:13px;font-weight:500\">The line<\u002Fspan>\n        <span style=\"font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3)\">intake → convert → gate → assay → ship → vault<\u002Fspan>\n        <span style=\"flex:1\"><\u002Fspan>\n        <span style=\"display:inline-flex;gap:2px;padding:2px;background:var(--surface-2);border:1px solid var(--border);border-radius:7px\">\n          <sc-for list=\"{{ densities }}\" as=\"d\" hint-placeholder-count=\"3\"><button sc-camel-on-click=\"{{ d.set }}\" style=\"font-family:var(--font-mono);font-size:9.5px;letter-spacing:.04em;text-transform:uppercase;padding:3px 7px;border:0;border-radius:5px;cursor:pointer;color:{{ d.color }};background:{{ d.bg }}\">{{ d.label }}<\u002Fbutton><\u002Fsc-for>\n        <\u002Fspan>\n        <span style=\"font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text-3)\">{{ inTransit }} in transit<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(6,1fr);padding:6px 10px 2px\">\n        <sc-for list=\"{{ stations }}\" as=\"st\" hint-placeholder-count=\"6\">\n          <div sc-camel-on-click=\"{{ st.onClick }}\" style=\"position:relative;text-align:center;padding:10px 4px 6px;cursor:{{ st.cursor }}\">\n            <div style=\"width:40px;height:40px;margin:0 auto 8px;border-radius:11px;display:grid;place-items:center;font-size:19px;transition:.3s;color:{{ st.glyphColor }};background:{{ st.glyphBg }};border:1px solid {{ st.glyphBorder }};animation:{{ st.tileAnim }}\">{{ st.glyph }}<\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.04em;color:var(--text-3);text-transform:uppercase\">{{ st.name }}<\u002Fdiv>\n            <span style=\"display:block;margin-top:3px;font-family:var(--font-mono);font-size:15px;font-weight:500;font-variant-numeric:tabular-nums;color:{{ st.countColor }}\">{{ st.count }}<\u002Fspan>\n            <sc-if value=\"{{ st.sub }}\"><span style=\"display:block;font-family:var(--font-mono);font-size:9px;color:{{ st.subColor }};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 2px\">{{ st.sub }}<\u002Fspan><\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <sc-if value=\"{{ showBelt }}\"><div style=\"position:relative;height:92px;margin:4px 6px 8px\"><canvas ref=\"{{ beltRef }}\" style=\"width:100%;height:100%;display:block\"><\u002Fcanvas><\u002Fdiv><\u002Fsc-if>\n    <\u002Fsection>\n\n    <sc-if value=\"{{ showKpis }}\">\n    <section style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin:14px 0\">\n      <sc-for list=\"{{ kpis }}\" as=\"kpi\" hint-placeholder-count=\"6\">\n        <div style=\"background:var(--surface-1);border:1px solid var(--border);border-radius:var(--r);padding:13px 14px;position:relative;overflow:hidden\">\n          <div style=\"font-family:var(--font-mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--text-3)\">{{ kpi.label }}<\u002Fdiv>\n          <div style=\"margin-top:7px;font-family:var(--font-mono);font-size:23px;font-weight:500;font-variant-numeric:tabular-nums;letter-spacing:-.02em;line-height:1\">{{ kpi.val }}<span style=\"font-size:12px;color:var(--text-3);font-weight:400;margin-left:3px\">{{ kpi.unit }}<\u002Fspan><\u002Fdiv>\n          <sc-if value=\"{{ kpi.delta }}\"><div style=\"font-family:var(--font-mono);font-size:10.5px;margin-top:6px;color:{{ kpi.deltaColor }}\">{{ kpi.delta }}<\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ kpi.gauge }}\"><div style=\"margin-top:9px;height:6px;border-radius:3px;background:var(--surface-2);overflow:hidden\"><i style=\"display:block;height:100%;border-radius:3px;width:{{ kpi.gaugePct }}%;background:{{ kpi.gaugeColor }};transition:width .6s ease\"><\u002Fi><\u002Fdiv><\u002Fsc-if>\n          <sc-if value=\"{{ kpi.spark }}\"><svg sc-camel-view-box=\"0 0 66 26\" sc-camel-preserve-aspect-ratio=\"none\" style=\"position:absolute;right:10px;bottom:10px;width:66px;height:26px;opacity:.9\"><polyline points=\"{{ kpi.sparkPts }}\" style=\"fill:none;stroke-width:1.5;stroke-linejoin:round;stroke:{{ kpi.sparkCol }}\"><\u002Fpolyline><circle cx=\"{{ kpi.dotX }}\" cy=\"{{ kpi.dotY }}\" r=\"1.8\" style=\"fill:{{ kpi.sparkCol }}\"><\u002Fcircle><\u002Fsvg><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fsection>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ hasPending }}\">\n    <section style=\"background:var(--surface-1);border:1px solid var(--clay);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:14px\">\n      <div style=\"display:flex;align-items:center;gap:10px;padding:12px 15px;border-bottom:1px solid var(--border)\"><span style=\"font-size:12.5px;font-weight:500;color:var(--text)\"><span style=\"color:var(--clay)\">✳<\u002Fspan> Gate — your routing decision<\u002Fspan><span style=\"flex:1\"><\u002Fspan><span style=\"font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--clay)\">your hand required<\u002Fspan><\u002Fdiv>\n      <div style=\"padding:12px 15px\">\n        <sc-for list=\"{{ pending }}\" as=\"p\" hint-placeholder-count=\"1\">\n          <div style=\"margin-bottom:8px;padding:11px 12px;border-radius:var(--r-sm);background:var(--clay-bg);border:1px solid rgba(217,119,87,.28)\">\n            <div style=\"display:flex;align-items:baseline;gap:6px;font-size:12.5px;color:var(--text)\"><span style=\"color:var(--clay)\">✳<\u002Fspan><span style=\"overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ p.name }}<\u002Fspan><\u002Fdiv>\n            <div style=\"font-family:var(--font-mono);font-size:10.5px;color:var(--text-2);margin:5px 0 9px\">{{ p.meta }}<\u002Fdiv>\n            <sc-if value=\"{{ p.warn }}\"><div style=\"font-family:var(--font-mono);font-size:10px;color:var(--warn);margin:0 0 9px\">⚠ {{ p.warn }}<\u002Fdiv><\u002Fsc-if>\n            <div style=\"display:flex;gap:7px\">\n              <button sc-camel-on-click=\"{{ p.routeLocal }}\" style=\"flex:1;padding:7px 6px;border-radius:7px;font-family:var(--font-mono);font-size:10.5px;cursor:pointer;color:var(--text);border:1px solid {{ p.localBorder }};background:{{ p.localBg }}\">🔒 Local {{ p.etaLocal }}<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ p.routeCloud }}\" style=\"flex:1;padding:7px 6px;border-radius:7px;font-family:var(--font-mono);font-size:10.5px;cursor:pointer;color:var(--text);border:1px solid {{ p.cloudBorder }};background:{{ p.cloudBg }}\">☁ Flash {{ p.etaCloud }}<\u002Fbutton>\n              <button sc-camel-on-click=\"{{ p.shipAsIs }}\" style=\"flex:1;padding:7px 6px;border-radius:7px;font-family:var(--font-mono);font-size:10.5px;cursor:pointer;color:var(--text-2);border:1px solid var(--border);background:var(--surface-2)\">Ship as-is<\u002Fbutton>\n            <\u002Fdiv>\n            <sc-if value=\"{{ p.showRule }}\"><label style=\"display:block;margin-top:7px;font-family:var(--font-mono);font-size:9.5px;color:var(--text-2);cursor:pointer\"><input type=\"checkbox\" sc-camel-on-change=\"{{ ruleChange }}\" style=\"vertical-align:middle;margin-right:5 ag: e.tag, msg: e.msg, tagColor: this._tagColor(e.tag) }));\n\n    // vault bar\n    const vs = s.vault.state;\n    const vault = vs === \"ready\" ? { cls: \"ready\", label: `Add ${s.vault.n || 1} new note${(s.vault.n || 1) === 1 ? \"\" : \"s\"} to Library`, note: s.vault.names || \"\", sparkColor: \"#16130f\", btnBg: \"var(--clay)\", btnBorder: \"var(--clay)\", btnColor: \"#16130f\", glow: \"vault-glow 1.8s ease-in-out infinite\", spin: \"none\" }\n      : vs === \"working\" ? { cls: \"working\", label: \"Pulling…\", note: \"\", sparkColor: \"var(--clay)\", btnBg: \"var(--clay-bg)\", btnBorder: \"var(--clay)\", btnColor: \"#e8e2dd\", glow: \"none\", spin: \"vault-spin 1s linear infinite\" }\n      : vs === \"success\" ? { cls: \"success\", label: \"Added to Library\", note: \"✓ done\", sparkColor: \"var(--ok)\", btnBg: \"var(--ok-bg)\", btnBorder: \"var(--ok)\", btnColor: \"#e8e2dd\", glow: \"none\", spin: \"none\" }\n      : { cls: \"idle\", label: \"Library\", note: \"up to date\", sparkColor: \"var(--clay)\", btnBg: \"var(--clay-bg)\", btnBorder: \"rgba(217,119,87,.45)\", btnColor: \"#e8e2dd\", glow: \"none\", spin: \"none\" };\n    vault.onClick = this.pullVault;\n\n    const portalDefs = [\n      { category: \"documents\", label: \"Documents\", icon: \"📄\" }, { category: \"photos\", label: \"Photos\", icon: \"🖼\" },\n      { category: \"code\", label: \"Code\", icon: \"💻\" }, { category: \"archive\", label: \"Archive\", icon: \"📦\" },\n      { category: \"convert-gpu\", label: \"GPU → Vault\", icon: \"⚡\" }, { category: \"convert\", label: \"To Vault\", icon: \"🔁\" },\n      { category: \"convert-scan\", label: \"Force OCR → Vault\", icon: \"🔍\" },\n    ];\n    const portals = portalDefs.map((p) => ({ ...p, onClick: () => this.drop(p.category), onDragOver: (e) => e.preventDefault(), onDrop: (e) => { e.preventDefault(); this.drop(p.category); } }));\n\n    const modes = [[\"dock\", \"Dock\"], [\"room\", \"Room\"], [\"wall\", \"Wall\"]].map(([key, label]) => ({\n      key, label, active: mode === key, set: () => this.setMode(key),\n      color: mode === key ? \"var(--text)\" : \"var(--text-2)\", bg: mode === key ? \"var(--elev)\" : \"transparent\",\n      dockColor: mode === key ? \"#fff\" : \"rgba(236,231,225,.55)\", dockBg: mode === key ? \"rgba(255,255,255,.14)\" : \"transparent\",\n    }));\n    const densities = [[\"full\", \"Full\"], [\"dots\", \"Dots\"], [\"minimal\", \"Min\"]].map(([key, label]) => ({\n      key, label, set: () => this.setDensity(key),\n      color: density === key ? \"var(--text)\" : \"var(--text-3)\", bg: density === key ? \"var(--elev)\" : \"transparent\",\n    }));\n    const accentColors = { clay: \"#d97757\", indigo: \"#7c86d9\", teal: \"#4fb0a4\" };\n    const accents = [\"clay\", \"indigo\", \"teal\"].map((key) => ({ key, color: accentColors[key], set: () => this.setAccent(key), ring: this.state.accent === key ? \"var(--text)\" : \"transparent\" }));\n\n    const wrapBg = mode === \"room\" ? \"radial-gradient(1200px 600px at 78% -10%, var(--clay-bg), transparent 60%), var(--bg)\"\n      : mode === \"dock\" ? \"linear-gradient(165deg, #232a33, #0d0f13 72%)\"\n      : \"radial-gradient(1000px 700px at 50% -12%, rgba(217,119,87,.07), transparent 60%), #0b0a09\";\n\n    const shiftText = \"shift: \" + s.shift.converted + \" converted · \" + s.shift.shipped + \" shipped\" + (s.shift.failed ? \" · \" + s.shift.failed + \" held\" : \"\");\n    const footLeft = this._flashMsg || shiftText;\n\n    let drill = null;\n    if (this._drill) {\n      const tree = this._stationTree(this._drill), sd = stations.find((x) => x.seg === this._drill);\n      drill = { seg: this._drill, glyph: sd ? sd.glyph : \"▤\", title: sd ? sd.name : this._drill, root: tree.root, origin: this._drillOrigin || \"50% 42%\", rows: this._flatten(tree.children, 0, []) };\n    }\n\n    return {\n      drillOpen: !!drill, drill, closeDrill: this.closeDrill, stop: this.stop,\n      mode, theme: this.state.theme, accent: this.state.accent, density,\n      isRoom: mode === \"room\", isDock: mode === \"dock\", isWall: mode === \"wall\",\n      rootRef: this._rootRef, beltRef: this._beltRef, wrapBg,\n      showBelt, showKpis, showPortals, stations, kpis, conv: convO, assay: assayO,\n      auditReportColor, auditEnforceColor, audits, pending: pendingCards, hasPending: pending > 0,\n      events, vault, portals, modes, densities, accents,\n      inTransit: this.chips.length, clock: this.state.clock, gpu: k.vram.toFixed(1),\n      sysLabel: \"viable\", watcherColor: s.watcher ? \"var(--ok)\" : \"var(--text-3)\", watcherLabel: s.watcher ? \"up\" : \"off\",\n      watcherDotColor: s.watcher ? \"#6fbf73\" : \"#666\",\n      toggleTheme: this.toggleTheme, toggleWatcher: this.toggleWatcher, toggleAudit: this.toggleAudit, reconvert: this.reconvert,\n      pullVault: this.pullVault, openObsidian: () => this.openReader(\"Obsidian\"), openZennotes: () => this.openReader(\"ZenNotes\"),\n      minimize: this.minimize, ruleChange: this.ruleChange, flash: this._flashMsg, shiftText, footLeft,\n      // wall extras\n      wallSurv: k.surv.toFixed(2), wallSurvColor: survCol, wallThru: k.thru.toFixed(1),\n      wallConv: converting ? b.name : \"line idle\", wallConvPct: convO.pct, wallEvent: events[0] ? events[0].msg : \"\",\n      paused: this.state.paused,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
