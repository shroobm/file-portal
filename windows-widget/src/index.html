<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>File Portal</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="titlebar" data-tauri-drag-region>
    <span class="title" data-tauri-drag-region>File Portal</span>
    <span id="titlebar-controls">
      <span id="surface-switch">
        <button class="surf-btn active" data-surface="dock" type="button" title="Compact dock">Dock</button>
        <button class="surf-btn" data-surface="room" type="button" title="Operations room">Room</button>
        <button class="surf-btn" data-surface="wall" type="button" title="Glanceable wall">Wall</button>
      </span>
      <button id="reader-obsidian" type="button" hidden title="Open Obsidian">◆</button>
      <button id="reader-zennotes" type="button" hidden title="Open ZenNotes">◈</button>
      <button id="watcher-btn" type="button" hidden title="Conveyor watcher">⏻</button>
      <button id="min-btn" type="button" title="Minimize" aria-label="Minimize">&#8211;</button>
    </span>
  </div>
  <div id="portals"></div>
  <div id="line" hidden>
    <span class="st" id="st-drop" title="Drop queue">▚ <span class="st-v">0</span></span>
    <span class="st-sep">▸</span>
    <span class="st" id="st-convert" title="Convert (Marker)">⚙ <span class="st-v">idle</span></span>
    <span class="st-sep">▸</span>
    <span class="st" id="st-gate" title="Analyst gate — click to change mode">✳ <span class="st-v">ask</span></span>
    <span class="st-sep">▸</span>
    <span class="st" id="st-assay" title="Survival audit — click to open the assay">◎<span class="assay-dot"></span><span class="st-v">—</span></span>
    <span class="st-sep">▸</span>
    <span class="st" id="st-ship" title="Last shipped">⇈ <span class="st-v">—</span></span>
    <span class="st-sep">▸</span>
    <span class="st" id="st-lib" title="Library">▤ <span class="st-v">—</span></span>
  </div>
  <div id="assay-card" hidden></div>
  <div id="preflight-cards"></div>
  <div id="vault-bar" hidden>
    <button id="vault-btn" type="button">
      <span class="spark">✳</span><span id="vault-btn-label">Library</span>
    </button>
    <span id="vault-note"></span>
  </div>
  <div id="status"></div>
  <div id="shift"></div>
  <div id="room" hidden></div>
  <script type="module" src="main.js"></script>
</body>
</html>
